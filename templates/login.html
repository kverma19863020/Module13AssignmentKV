<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Module13AssignmentKV</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="card">
  <h1>Welcome Back</h1>
  <p class="subtitle">Module13AssignmentKV &mdash; JWT Login</p>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="johndoe"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Your password"/>
    </div>
    <button type="submit">Sign In</button>
  </form>

  <div id="loginMessage"></div>
  <div class="link">Don't have an account? <a href="/register">Register</a></div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
