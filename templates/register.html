<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Module13AssignmentKV</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="card">
  <h1>Create Account</h1>
  <p class="subtitle">Module13AssignmentKV &mdash; JWT Registration</p>

  <form id="registerForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="johndoe" required/>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="user@example.com" required/>
    </div>
    <div class="form-group">
      <label for="password">Password <small style="color:#888">(min 8 characters)</small></label>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required/>
    </div>
    <button type="submit">Create Account</button>
  </form>

  <div id="registerMessage"></div>
  <div class="link">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
