name: CI/CD - Module13AssignmentKV

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install flake8 && pip install -r requirements.txt
      - name: Run flake8
        run: flake8 app/ main.py --max-line-length=120 --ignore=E501,W503

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: module13db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/module13db
          SECRET_KEY: ci-test-secret-key
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -f http://localhost:8000/health || exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          cd tests
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E Tests
        env:
          BASE_URL: http://localhost:8000
        run: cd tests && npx playwright test --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

  docker-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/module13assignmentkv:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/module13assignmentkv:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
